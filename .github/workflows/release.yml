name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify version in plugin header
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          HEADER_VERSION=$(grep -oP 'Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+' next-title-trim-count.php)
          if [ "$HEADER_VERSION" != "$VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match plugin header version ($HEADER_VERSION)"
            exit 1
          fi

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - run: composer install --no-dev --no-interaction --optimize-autoloader

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Create plugin zip
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          SLUG="next-title-trim-count"
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.husky' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='src' \
            --exclude='.wp-env.json' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='phpcs.xml.dist' \
            --exclude='phpunit.xml.dist' \
            --exclude='playwright.config.ts' \
            --exclude='.gitignore' \
            --exclude='debug.log' \
            --exclude='db.sql' \
            --exclude='bin' \
            ./ "${SLUG}/"
          zip -r "${SLUG}-${VERSION}.zip" "${SLUG}/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: next-title-trim-count-${{ steps.meta.outputs.version }}.zip
          generate_release_notes: true
