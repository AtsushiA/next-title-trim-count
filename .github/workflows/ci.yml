name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpcs:
    name: phpcs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - run: composer install --no-interaction
      - run: composer run phpcs

  phpunit:
    name: "PHPUnit (WP ${{ matrix.wp }} / PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          # MYSQL_DATABASE は指定しない → install-wp-tests.sh が wordpress_test を作成する
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    strategy:
      fail-fast: false
      matrix:
        include:
          - wp: latest
            php: '8.3'
          - wp: latest
            php: '8.4'
          - wp: '6.8'
            php: '8.3'
          - wp: '6.8'
            php: '8.4'
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          extensions: mysqli
      - name: Reinstall Composer dependencies (with dev)
        run: |
          rm -rf vendor
          composer install --no-interaction
      - name: Install WordPress test suite
        # 引数6なし → スクリプトが wordpress_test DB を作成する
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 ${{ matrix.wp }}
      - name: Run Unit tests
        # Unit bootstrap (WP非依存) で実行。Integration bootstrap を使うと
        # WordPress が先にロードされ Brain\Monkey の Patchwork が競合する。
        run: vendor/bin/phpunit --testsuite unit
      - name: Run Integration tests
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
        run: vendor/bin/phpunit --testsuite integration --bootstrap tests/phpunit/bootstrap.php

  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Start wp-env
        run: npx wp-env start
      - name: Install & activate plugin-check
        run: |
          npx wp-env run cli wp plugin install plugin-check --activate
      - name: Run plugin check
        run: |
          npx wp-env run cli wp plugin check next-Title-TrimCount \
            --ignore-warnings \
            --categories=general,performance,accessibility,security \
            --exclude-directories=vendor,tests,node_modules

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - run: npm ci
      - run: composer install --no-interaction
      - run: npx playwright install chromium --with-deps
      - name: Start wp-env
        run: npx wp-env start
      - name: Run E2E tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
